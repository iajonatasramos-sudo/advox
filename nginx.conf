server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — qualquer rota cai no index.html (Advox roteia no cliente)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets imutáveis (Vite usa hash no nome dos chunks) — cache de 1 ano
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Headers de segurança básicos
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Não cacheia o index.html — pra mudanças aparecerem instantâneas
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    # 404 fallback (caso try_files falhe por algum motivo)
    error_page 404 /index.html;
}
